<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南大東村ネコ目撃情報アンケート</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 10px; background-color: #f4f7f6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 22px; }
    .notice-text { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 15px; padding: 0 5px; }
    .intro-text { background-color: #e8f4fd; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; margin-bottom: 25px; border-left: 5px solid #3498db; white-space: pre-wrap; }
    .form-group { margin-bottom: 25px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; font-size: 15px; }
    #map { height: 300px; width: 100%; border-radius: 8px; border: 1px solid #ddd; }
    .hidden { display: none; }
    input[type="text"], input[type="file"], select, input[type="date"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    
    .sample-box { margin-top: 10px; margin-bottom: 12px; }
    .sample-img { max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #ddd; display: block; margin: 0 auto; }
    
    .radio-group { padding: 5px 0; display: flex; flex-wrap: wrap; gap: 15px; }
    .radio-group label { display: inline-flex; align-items: center; font-weight: normal; margin-right: 0; cursor: pointer; font-size: 16px; }
    .radio-group input[type="radio"] { width: 22px; height: 22px; margin-right: 8px; cursor: pointer; }
    
    .btn-location { background-color: #3498db; color: white; padding: 12px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; margin-bottom: 12px; display: block; width: 100%; box-sizing: border-box; transition: background 0.2s; }
    .btn-location:hover { background-color: #2980b9; }
    #submitBtn { width: 100%; background-color: #2ecc71; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background 0.2s; }
    #submitBtn:hover { background-color: #27ae60; }
    
    #output { margin-top: 20px; text-align: center; font-weight: bold; font-size: 17px; color: #e67e22; line-height: 1.5; white-space: pre-wrap; }
    .required::after { content: " *"; color: #e74c3c; }
  </style>
</head>
<body>
<div class="container">
  <h2>ネコ目撃情報アンケート</h2>
  
  <div class="notice-text">※匿名での回答になるため個人は特定されません。</div>

  <div class="intro-text">南大東村ではネコに関するトラブルや南大東島固有の野生動物の保全のためネコの避妊去勢手術を行っています。皆さまのご協力により多くのネコに避妊去勢手術を実施することができ、最終段階に近づいてきています。
そこで残りのネコ達の手術を進めるため、外を歩くネコの目撃情報を集めています。「1回だけ見た」という方でもお気軽にお答えください。皆様のご協力をお願いいたします。</div>

  <form id="catForm" onsubmit="handleFormSubmit(this); return false;">
    <div class="form-group">
      <label class="required">目撃場所 (地図をタップ、または現在地ボタンを押してピンを立ててください)</label>
      <button type="button" id="currentLocationBtn" class="btn-location" onclick="goToCurrentLocation()">現在地を取得する</button>
      <div id="map"></div>
      <input type="hidden" id="location" name="location" required>
      <p id="locationDisplay" style="color: #7f8c8d; font-size: 0.9em; margin-top: 8px; font-style: italic;">場所が選択されていません</p>
    </div>

    <div class="form-group">
      <label class="required">目撃日時</label>
      <div style="display: flex; gap: 10px;">
        <input type="date" id="dateInput" style="flex: 2;" required>
        <select id="hourInput" style="flex: 1;" required>
          <option value="">時頃</option>
          <option value="00">0時頃</option><option value="01">1時頃</option><option value="02">2時頃</option>
          <option value="03">3時頃</option><option value="04">4時頃</option><option value="05">5時頃</option>
          <option value="06">6時頃</option><option value="07">7時頃</option><option value="08">8時頃</option>
          <option value="09">9時頃</option><option value="10">10時頃</option><option value="11">11時頃</option>
          <option value="12">12時頃</option><option value="13">13時頃</option><option value="14">14時頃</option>
          <option value="15">15時頃</option><option value="16">16時頃</option><option value="17">17時頃</option>
          <option value="18">18時頃</option><option value="19">19時頃</option><option value="20">20時頃</option>
          <option value="21">21時頃</option><option value="22">22時頃</option><option value="23">23時頃</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="catCount" class="required">ネコの頭数</label>
      <select id="catCount" name="catCount" onchange="toggleCatDetail()" required>
        <option value="">選択してください</option>
        <option value="1頭">1頭</option>
        <option value="2頭">2頭</option>
        <option value="3頭以上">3頭以上</option>
        <option value="親子">親子</option>
      </select>
      <div id="catCountNumGroup" class="hidden" style="margin-top: 15px;">
        <label for="catCountNum" class="required">具体的な頭数</label>
        <select id="catCountNum" name="catCountNum">
          <option value="">選択してください</option>
          <option value="3頭">3頭</option><option value="4頭">4頭</option><option value="5頭">5頭</option><option value="6頭以上">6頭以上</option>
        </select>
      </div>
      <div id="catDetailGroup" class="hidden" style="margin-top: 15px;">
        <label for="catCountDetail" class="required">頭数の詳細</label>
        <input type="text" id="catCountDetail" name="catCountDetail" placeholder="例: 親1頭、子3頭 など">
      </div>
    </div>

    <div class="form-group">
      <label class="required">耳カットされている個体か</label>
      
      <div class="sample-box">
        <img class="sample-img" src="unnamed.png" alt="">
      </div>

      <div class="radio-group">
        <label><input type="radio" name="earCut" value="はい" onchange="toggleEarCutDetail()" required> はい</label>
        <label><input type="radio" name="earCut" value="いいえ" onchange="toggleEarCutDetail()"> いいえ</label>
        <label><input type="radio" name="earCut" value="わからない" onchange="toggleEarCutDetail()"> わからない</label>
        <label><input type="radio" name="earCut" value="その他" onchange="toggleEarCutDetail()"> その他</label>
      </div>

      <div id="earCutDetailGroup" class="hidden" style="margin-top: 15px;">
        <label for="earCutDetail" class="required">耳カットの状況の詳細</label>
        <input type="text" id="earCutDetail" name="earCutDetail" placeholder="例: 3頭中1頭耳カットあり など">
      </div>
    </div>

    <div class="form-group">
      <label for="catPattern">ネコの柄（わかる範囲で）</label>
      <input type="text" id="catPattern" name="catPattern" placeholder="例: キジトラ、白黒、三毛など">
    </div>

    <div class="form-group">
      <label for="photo">目撃写真（データがあれば添付してください）</label>
      <input type="file" id="photo" name="photo" accept="image/*">
    </div>

    <button type="submit" id="submitBtn">目撃情報を送信する</button>
  </form>
  <div id="output"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var map = L.map('map').setView([25.845, 131.23], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  var marker;
  map.on('click', function(e) { updateMarkerAndLocation(e.latlng); });

  function goToCurrentLocation() {
    if (!navigator.geolocation) { alert("お使いの端末は位置情報に対応していません。"); return; }
    var locBtn = document.getElementById('currentLocationBtn');
    locBtn.disabled = true; locBtn.innerText = "位置情報を取得中...";
    navigator.geolocation.getCurrentPosition(
      function(position) {
        var latlng = L.latLng(position.coords.latitude, position.coords.longitude);
        map.setView(latlng, 16); updateMarkerAndLocation(latlng);
        locBtn.disabled = false; locBtn.innerText = "現在地を取得する";
      },
      function() { alert("位置情報の取得に失敗しました。"); locBtn.disabled = false; locBtn.innerText = "現在地を取得する"; },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function updateMarkerAndLocation(latlng) {
    var lat = latlng.lat.toFixed(6); var lng = latlng.lng.toFixed(6);
    if (marker) { marker.setLatLng(latlng); } else { marker = L.marker(latlng).addTo(map); }
    document.getElementById('location').value = lat + ", " + lng;
    document.getElementById('locationDisplay').innerText = "選択された位置: 緯度 " + lat + " / 経度 " + lng;
  }

  function toggleCatDetail() {
    var catCountSelect = document.getElementById('catCount').value;
    var numGroup = document.getElementById('catCountNumGroup');
    var detailGroup = document.getElementById('catDetailGroup');
    numGroup.classList.add('hidden'); detailGroup.classList.add('hidden');
    if (catCountSelect === '3頭以上') { numGroup.classList.remove('hidden'); }
    else if (catCountSelect === '親子') { detailGroup.classList.remove('hidden'); }
  }

  function toggleEarCutDetail() {
    var earCutSelect = document.querySelector('input[name="earCut"]:checked')?.value;
    var detailGroup = document.getElementById('earCutDetailGroup');
    var detailInput = document.getElementById('earCutDetail');
    if (earCutSelect === 'browse' || earCutSelect === 'その他') {
      detailGroup.classList.remove('hidden');
      detailInput.required = true;
    } else {
      detailGroup.classList.add('hidden');
      detailInput.required = false;
      detailInput.value = '';
    }
  }

  function handleFormSubmit(formObject) {
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('output').innerText = "回答を送信中です。送信には時間がかかる場合がございます、そのままの画面でお待ちください。";
    
    var latlngStr = document.getElementById('location').value;
    
    // 🕒 分を省いた日付と時間を合体させてGASに送る形式に自動組み立てします
    var dateVal = document.getElementById('dateInput').value;
    var hourVal = document.getElementById('hourInput').value;
    var datetimeVal = dateVal + 'T' + hourVal + ':00';
    
    var catCountSelect = document.getElementById('catCount').value;
    var catCountResult = catCountSelect;
    if (catCountSelect === '3頭以上') { catCountResult = document.getElementById('catCountNum').value; }
    else if (catCountSelect === '親子') { catCountResult = document.getElementById('catCountDetail').value; }
    
    var earCutSelect = document.querySelector('input[name="earCut"]:checked')?.value || "";
    if (earCutSelect === 'その他') {
      earCutSelect = document.getElementById('earCutDetail').value;
    }
    
    var catPatternVal = document.getElementById('catPattern').value;
    var fileInput = document.getElementById('photo');
    var file = fileInput.files[0];
    
    var sendData = {
      location: latlngStr, datetime: datetimeVal, catCountResult: catCountResult, earCut: earCutSelect, catPattern: catPatternVal, photoData: null, photoName: null
    };

    if (file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var MAX_WIDTH = 500; 
          var MAX_HEIGHT = 500;
          var width = img.width; var height = img.height;
          if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
          else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
          canvas.width = width; canvas.height = height;
          var ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
          
          sendData.photoData = canvas.toDataURL('image/jpeg', 0.7); 
          sendData.photoName = file.name.split('.')[0] + '.jpg';
          uploadToServer(sendData);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    } else {
      uploadToServer(sendData);
    }
  }

  function uploadToServer(sendData) {
    var gasUrl = "https://script.google.com/macros/s/AKfycbysiPzuRoUfj03WofY75kN5yLGvuwdQbGrk2crwCw6GMzIoKowhdBwSZV4GPshq2Pse/exec"; 
    fetch(gasUrl, { method: "POST", body: JSON.stringify(sendData), mode: "no-cors" })
    .then(function() {
      document.getElementById('output').style.color = "#2ecc71"; 
      document.getElementById('output').innerText = "目撃情報を送信しました。ご協力ありがとうございました！\nこのアンケートは何度でも回答できます。";
      document.getElementById('catForm').reset();
      document.getElementById('earCutDetailGroup').classList.add('hidden'); 
      if (marker) { map.removeLayer(marker); marker = null; }
      document.getElementById('submitBtn').disabled = false;
    })
    .catch(function() {
      document.getElementById('output').style.color = "#e74c3c"; 
      document.getElementById('output').innerText = "送信に失敗しました。";
      document.getElementById('submitBtn').disabled = false;
    });
  }
</script>
</body>
</html>
